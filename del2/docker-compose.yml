# Lab 2 — Del 2 Sandbox

services:
  attacker:
    image: alpine:3.20
    container_name: lab2-attacker
    hostname: attacker
    command: sh -c "apk add --no-cache nmap curl >/dev/null && sleep infinity"
    networks:
      it:
      dmz:

  historian:
    image: alpine:3.20
    container_name: lab2-historian
    hostname: historian
    command: sh -c "apk add --no-cache nmap curl >/dev/null && sleep infinity"
    networks:
      dmz:
      ot:

  jump-server:
    image: alpine:3.20
    container_name: lab2-jump
    hostname: jump-server
    command: sh -c "apk add --no-cache openssh nmap curl >/dev/null && ssh-keygen -A && /usr/sbin/sshd -D -e"
    networks:
      it:
      dmz:
      ot:
    ports:
      - "127.0.0.1:2222:22"

  mock-plc:
    image: alpine:3.20
    container_name: lab2-plc
    hostname: mock-plc
    command: nc -lk -p 502 -e /bin/true
    networks:
      ot:

networks:
  it:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.10.0/24

  dmz:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.20.0/24

  ot:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.50.0/24
